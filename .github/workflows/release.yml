name: Build and Release Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: amd64
            name: collei-agent-linux-amd64
          - arch: arm64
            name: collei-agent-linux-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build AMD64 Binary
        if: matrix.arch == 'amd64'
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace \
            python:3.13-slim-bullseye \
            bash -c "apt-get update && apt-get install -y binutils && \
            cd /workspace && \
            pip install --upgrade pip && \
            pip install -r requirements.txt pyinstaller setuptools && \
            pyinstaller --onefile --name ${{ matrix.name }} agent.py && \
            chown -R $(id -u):$(id -g) dist build *.spec"

      - name: Build ARM64 Binary
        if: matrix.arch == 'arm64'
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace \
            --platform linux/arm64 \
            python:3.13-slim-bullseye \
            bash -c "apt-get update && apt-get install -y binutils && \
            cd /workspace && \
            pip install --upgrade pip && \
            pip install -r requirements.txt pyinstaller setuptools && \
            pyinstaller --onefile --name ${{ matrix.name }} agent.py && \
            chown -R $(id -u):$(id -g) dist build *.spec"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
