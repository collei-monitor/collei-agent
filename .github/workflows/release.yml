name: Build and Release Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            name: collei-agent-linux-amd64
          - arch: arm64
            name: collei-agent-linux-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Python (for AMD64)
        if: matrix.arch == 'amd64'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build AMD64 Binary
        if: matrix.arch == 'amd64'
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller staticx setuptools
          pyinstaller --onefile --name ${{ matrix.name }} agent.py
          staticx dist/${{ matrix.name }} dist/${{ matrix.name }}-static
          mv dist/${{ matrix.name }}-static dist/${{ matrix.name }}

      - name: Build ARM64 Binary
        if: matrix.arch == 'arm64'
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace \
            --platform linux/arm64 \
            python:3.13 \
            bash -c "cd /workspace && \
            apt-get update && apt-get install -y patchelf && \
            pip install --upgrade pip && \
            pip install -r requirements.txt pyinstaller staticx setuptools && \
            pyinstaller --onefile --name ${{ matrix.name }} agent.py && \
            staticx dist/${{ matrix.name }} dist/${{ matrix.name }}-static && \
            mv dist/${{ matrix.name }}-static dist/${{ matrix.name }} && \
            chown -R $(id -u):$(id -g) dist build *.spec"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
